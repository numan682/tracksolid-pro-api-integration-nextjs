name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Placeholder values so the build never depends on real secrets.
          TRACKSOLID_ACCOUNT: ci
          TRACKSOLID_PASSWORD: ci
          TRACKSOLID_APP_KEY: ci
          TRACKSOLID_APP_SECRET: ci
          TRACKSOLID_API_URL: https://example.com/route/rest
          SESSION_SECRET: ci_placeholder_session_secret_ci_placeholder
